version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ddd2026-sqlserver
    environment:
      - SA_PASSWORD=Your_password123
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./ProjetoDDD2026/WebApi
      dockerfile: Dockerfile
    container_name: ddd2026-api
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PesquisaBase2026;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False;
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./ProjetoDDD2026/frontend
      dockerfile: Dockerfile
    container_name: ddd2026-frontend
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://api:8080
    ports:
      - "5173:80"

volumes:
  sql_data:

